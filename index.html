<!DOCTYPE html> <!-- indica que el código es HTML5 -->
<html lang="es"> <!-- indica el comienzo del codigo y que la pág será en español -->
    <head>
        <meta charset="UTF-8"> <!-- permite caracteres especiales -->
        <meta name=viewport" content="width=device-width, initial-scale=1.0"> <!-- se usa para ajustar la página a cualquier tipo de pantalla -->
<title>Land of Dawn Central — Calendario</title>
    </head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <div class="logo">
        <img src="img/logo.png" alt="Logo de la página BANG BANG DATA">
        <span> BANG BANG DATA</span>
    </div>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Matches</a></li>
            <li><a href="#">Teams</a></li>
            <li><a href="#">Players</a></li>
        </ul>
    </nav>
</header>
   <main>
      <div class="container">
        <section class="hero">
          <img src="img/hero.jpg" alt="Imagen del evento principal" />
          <div class="hero-content">
            <div class="hero-header">
              <h1 class="hero-title">TORNEO IMPORTANTE DE E-SPORTS</h1>
              <span class="hero-state">. EN VIVO</span>
            </div>
            <h2>Próximos partidos:</h2>
          </div>
          <section class="featured-matches">
            <h2>Partido destacado</h2>
            <div class="match-info">
              <span class="match-hour">FECHA Y HORA</span>
            </div>
            <div class="match-card">
              <div class="match-teams">
                <div class="team-1">
                  <img src="img/team1.png" alt="Imagen de equipo 1" />
                  Team 1
                </div>
                <span class="vs">VS</span>
                <span class="match-rounds">(BO1)</span>
                <div class="team-2">
                  Team 2
                  <img src="img/team2.png" alt="Imagen de equipo 2" />
                </div>
              </div>
            </div>
            <span class="match-tournament">NOMBRE DE TORNEO</span>
          </section>
        </section>
      </div>
    </main>
  </body>
</html>
